<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	
<div class="form-container">
    <h2>Car Insurance Registration Form</h2>
    
    <form action="#" method="post">
        
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="radio-group">
                <input type="radio" id="gender-male" name="gender" value="male" required>
                <label for="gender-male">Male</label>
                
                <input type="radio" id="gender-female" name="gender" value="female" required>
                <label for="gender-female">Female</label>
                
                <input type="radio" id="gender-other" name="gender" value="other" required>
                <label for="gender-other">Other</label>
            </div>
        </div>

        <div class="form-group">
            <label for="cars">Car Brands</label>
            <select id="cars" name="cars">
                <option value="">--Select a Brand--</option>
                <option value="bmw">BMW</option>
                <option value="audi">Audi</option>
                <option value="mercedes">Mercedez</option>
            </select>
        </div>

        <div class="form-group">
            <label for="carage">Car Age</label>
            <input type="number" id="carage" name="carage" required>
        </div>

        <div class="form-group">
            <label for="dop">Date of Purchase (dop)</label>
            <input type="date" id="dop" name="dop" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit">Submit</button>

    </form>
</div>
	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
